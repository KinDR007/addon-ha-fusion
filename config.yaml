# required configuration options
name: Fusion (KinDR007 fork)
version: "2024.10.1+kindr.20260516-0945"
slug: ha_fusion
description: A modern, easy-to-use and performant custom Home Assistant dashboard (KinDR007 fork)
arch:
  - amd64

# disable the docker default system init
init: false

# homepage of the add-on
url: https://github.com/KinDR007/addon-ha-fusion

# icon for the menu panel integration
panel_icon: mdi:atom

# allow non-administration users
panel_admin: false

# security profile
apparmor: true

# ingress feature for the add-on
ingress: true
ingress_stream: true

# enable api to get host port
hassio_api: true

# port to expose, null defaults to disabled
ports:
  8099/tcp: null

# GHCR images built by .github/workflows/publish.yml (must be lowercase for ghcr.io)
image: ghcr.io/kindr007/addon-ha-fusion-{arch}
