name: Publish

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "config.yaml"
      - "Dockerfile"
      - "run.sh"
      - "apparmor.txt"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # home-assistant/builder@master builds multi-arch HA addons. It expects an
      # `image` field in config.yaml of the form `prefix/addon-name-{arch}` and
      # pushes to `<--docker-hub>/<image-prefix>-<arch>:<version>`.
      # We hard-code the lowercase owner to match the lowercase
      # `image: ghcr.io/kindr007/...` field in config.yaml (GHCR requires lowercase).
      # `--all` is deprecated; list architectures explicitly.
      # Current home-assistant/builder supports amd64 + aarch64.
      - name: Build & publish addon (multi-arch)
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --aarch64 \
            --target /data \
            --docker-hub ghcr.io/kindr007
