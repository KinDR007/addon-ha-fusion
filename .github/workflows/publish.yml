name: Publish

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "config.yaml"
      - "Dockerfile"
      - "run.sh"
      - "apparmor.txt"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      # home-assistant/builder runs the build inside its own docker container
      # which sets up qemu and buildkit internally. Adding docker/setup-buildx-action
      # at the runner level changes the default driver to docker-container, which
      # stores images in the buildx cache instead of the host docker daemon — the
      # subsequent `docker tag` step in home-assistant/builder then fails with
      # "No such image". Keep this minimal.

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # home-assistant/builder@master builds multi-arch HA addons. It expects an
      # `image` field in config.yaml of the form `prefix/addon-name-{arch}` and
      # pushes to `<--docker-hub>/<image-prefix>-<arch>:<version>`.
      # We hard-code the lowercase owner to match the lowercase
      # `image: ghcr.io/kindr007/...` field in config.yaml (GHCR requires lowercase).
      # `--all` is deprecated; list architectures explicitly.
      # Only amd64 is needed for the target HA OS host.
      - name: Build & publish addon (amd64)
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --target /data \
            --docker-hub ghcr.io/kindr007
